# fly.toml app configuration file generated for nz-project-management on 2026-03-12T17:49:52+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nz-project-management'
primary_region = 'bom'

[build]

[env]
  DATA_DIR = '/data'
  PORT = '3000'

[[mounts]]
  source = 'pm_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
